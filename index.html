<!doctype html>
<html>
<body style="background:#111;color:#fff;font-family:system-ui">
  <h1>LED test</h1>
  <button onclick="testRed()">Red</button>
  <button onclick="testGreen()">Green</button>
  <pre id="log"></pre>

  <script>
    function log(msg) {
      document.getElementById('log').textContent += msg + '\n';
      console.log(msg);
    }

    function send(cmd) {
      log('typeof adbcommand = ' + typeof adbcommand);
      log('cmd = ' + cmd);

      try {
        if (typeof adbcommand === 'function') {
          adbcommand(cmd);
          log('adbcommand sent');
        } else {
          log('adbcommand not available');
        }
      } catch (e) {
        log('adbcommand error: ' + e.message);
      }
    }

    function testRed() {
      send('echo w 0x04 > /sys/devices/platform/led_con_h/zigbee_reset');
    }

    function testGreen() {
      send('echo w 0x06 > /sys/devices/platform/led_con_h/zigbee_reset');
    }
  </script>
</body>
</html>
