<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="refresh" content="300"/>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/da.global.min.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.11/index.global.min.js" defer></script>

  <style>
    /* Full‐screen dark background */
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui;
    }
    #calendar {
      height: 100%;
    }

    /* Toolbar button colors */
    .fc .fc-toolbar-title {
      color: #04b4ff;
    }
    .fc .fc-button, 
    .fc .fc-button-primary {
      background: #04b4ff;
      border: 0;
    }
    .fc-event {
      background: #04b4ff !important;
      border: 0 !important;
    }

    /* Allow multi‐line event titles and time ranges in month cells */
    .fc-daygrid-event > .fc-event-main-frame,
    .fc-daygrid-event > .fc-event-main-frame * {
      white-space: normal !important;
      overflow-wrap: break-word !important;
      word-break: break-word !important;
      align-items: flex-start !important;
    }
    /* Add a bit of padding so wrapped text looks neat */
    .fc-daygrid-event {
      padding: 2px 4px !important;
    }
  </style>
</head>
<body>
  <div id="calendar"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        locale          : 'da',                       // Danish locale
        initialView     : 'dayGridMonth',
        headerToolbar   : { left:'title', right:'prev,next today' },
        nowIndicator    : true,
        displayEventEnd : true,                       // Show “09:00 – 10:30” instead of just “09:00”
        displayEventTime: true,
        eventTimeFormat : { hour:'2-digit', minute:'2-digit', meridiem:false },

        /* Custom renderer: show “HH:mm – HH:mm • Title” only (no duration) */
        eventContent(arg) {
          const container = document.createElement('div');
          container.textContent = arg.timeText + ' • ' + arg.event.title;   // arg.timeText already includes the range
          return { domNodes: [container] };
        },

        /* Outlook .ics feed via Cloudflare Worker */
        events: {
          url   : 'https://modelokalelille.no-022.workers.dev',
          format: 'ics'
        }
      });

      calendar.render();

   // Create a visual indicator on the screen so we can see what the code is doing
    const debugBar = document.createElement('div');
    debugBar.style = "position:fixed; top:0; left:0; width:100%; height:10px; z-index:9999; background:gray;";
    document.body.appendChild(debugBar);

    function updateLEDStatus() {
        const now = new Date();
        const isBusy = calendar.getEvents().some(e => now >= e.start && now <= e.end);
        
        // Update the on-screen bar color
        debugBar.style.backgroundColor = isBusy ? "red" : "green";

        // ALL known iiyama/Android LED intents - we send them all to be sure
        const intents = isBusy 
            ? ["com.iiyama.led.RED", "com.android.server.service.led.red", "internal.led.red"] 
            : ["com.iiyama.led.GREEN", "com.android.server.service.led.green", "internal.led.green"];

        intents.forEach(intent => {
            // Try Method A: REST API (thanksmister default)
            fetch('http://localhost:2971/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: 'broadcast', action: intent })
            }).catch(() => {});

            // Try Method B: JS Bridge (if it exists)
            if (window.wallpanel && window.wallpanel.sendBroadcastIntent) {
                window.wallpanel.sendBroadcastIntent(intent, null);
            }
        });
    }
    setInterval(updateLEDStatus, 30000);
      
    });
  </script>
</body>
</html>
