<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="refresh" content="300"/>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/da.global.min.js" defer></script>

  <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.11/index.global.min.js" defer></script>

  <style>
    /* Full‐screen dark background */
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui;
    }
    #calendar {
      height: 100%;
    }

    /* Toolbar button colors */
    .fc .fc-toolbar-title {
      color: #04b4ff;
    }
    .fc .fc-button, 
    .fc .fc-button-primary {
      background: #04b4ff;
      border: 0;
    }
    .fc-event {
      background: #04b4ff !important;
      border: 0 !important;
    }

    /* Allow multi‐line event titles and time ranges in month cells */
    .fc-daygrid-event > .fc-event-main-frame,
    .fc-daygrid-event > .fc-event-main-frame * {
      white-space: normal !important;
      overflow-wrap: break-word !important;
      word-break: break-word !important;
      align-items: flex-start !important;
    }
    /* Add a bit of padding so wrapped text looks neat */
    .fc-daygrid-event {
      padding: 2px 4px !important;
    }
  </style>
</head>
<body>
  <div id="calendar"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        locale          : 'da',                       // Danish locale
        initialView     : 'dayGridMonth',
        headerToolbar   : { left:'title', right:'prev,next today' },
        nowIndicator    : true,
        displayEventEnd : true,                       // Show “09:00 – 10:30” instead of just “09:00”
        displayEventTime: true,
        eventTimeFormat : { hour:'2-digit', minute:'2-digit', meridiem:false },

        /* Custom renderer: show “HH:mm – HH:mm • Title” only (no duration) */
        eventContent(arg) {
          const container = document.createElement('div');
          container.textContent = arg.timeText + ' • ' + arg.event.title;   // arg.timeText already includes the range
          return { domNodes: [container] };
        },

        /* Outlook .ics feed via Cloudflare Worker */
        events: {
          url   : 'https://modelokalelille.no-022.workers.dev',
          format: 'ics'
        }
      });

      calendar.render();

   function updateLEDStatus() {
        const now = new Date();
        const allEvents = calendar.getEvents();
        
        // Check if current time falls between any event start and end
        const isBusy = allEvents.some(event => {
          return now >= event.start && now <= event.end;
        });

        const RED_INTENT = "com.iiyama.led.RED";
        const GREEN_INTENT = "com.iiyama.led.GREEN";
        const targetIntent = isBusy ? RED_INTENT : GREEN_INTENT;

        // METHOD 1: Try JavaScript Bridge (if available in a future update)
        if (window.wallpanel && window.wallpanel.sendBroadcastIntent) {
            window.wallpanel.sendBroadcastIntent(targetIntent, null);
            console.log("Sent via Bridge: " + targetIntent);
        } 
        // METHOD 2: Try REST API (Works on thanksmister if enabled)
        else {
            fetch('http://localhost:2971/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    command: 'broadcast',
                    action: targetIntent
                })
            })
            .then(() => console.log("Sent via REST API: " + targetIntent))
            .catch(err => console.log("Bridge & API failed. Is REST API enabled in WallPanel?"));
        }
      }

      // Check every 60 seconds
      setInterval(updateLEDStatus, 60000);
      
    });
  </script>
</body>
</html>
